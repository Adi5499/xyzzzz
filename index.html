<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>युवा रोजगार योजना</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #7b2ff7, transparent 70%);
            top: -100px; left: -100px;
            animation: blobFloat 10s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #00c6ff, transparent 70%);
            bottom: -80px; right: -80px;
            animation: blobFloat 13s ease-in-out infinite alternate-reverse;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes blobFloat {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.1); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceIn {
            0%   { transform: scale(0.7); opacity: 0; }
            60%  { transform: scale(1.08); opacity: 1; }
            80%  { transform: scale(0.96); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15%  { transform: translateX(-8px) rotate(-1deg); }
            30%  { transform: translateX(8px) rotate(1deg); }
            45%  { transform: translateX(-6px); }
            60%  { transform: translateX(6px); }
            75%  { transform: translateX(-3px); }
            90%  { transform: translateX(3px); }
        }
        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 10px rgba(0, 255, 150, 0.4), 0 0 20px rgba(0, 255, 150, 0.2); }
            50%       { text-shadow: 0 0 20px rgba(0, 255, 150, 0.8), 0 0 40px rgba(0, 255, 150, 0.4); }
        }
        @keyframes failGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 80, 80, 0.4), 0 0 20px rgba(255, 80, 80, 0.2); }
            50%       { text-shadow: 0 0 20px rgba(255, 80, 80, 0.8), 0 0 40px rgba(255, 80, 80, 0.4); }
        }
        @keyframes emojiFloat {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50%       { transform: translateY(-10px) rotate(3deg); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeSlideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .hidden { display: none !important; }

        h1, h2 {
            color: #fff;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        h1 { font-size: clamp(1.6rem, 5vw, 2rem); margin-bottom: 10px; }
        h2 { font-size: clamp(1.4rem, 4.5vw, 1.7rem); margin-bottom: 6px; }
        h3 { color: rgba(255,255,255,0.85); font-size: 1.1rem; font-weight: 500; margin: 10px 0 6px; }

        p {
            color: rgba(255, 255, 255, 0.65);
            font-size: 1rem;
            line-height: 1.6;
        }

        .step-badge {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 18px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            margin: 18px 0 24px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.35); }
        input[type="text"]:focus {
            border-color: rgba(130, 100, 255, 0.7);
            background: rgba(255, 255, 255, 0.11);
            box-shadow: 0 0 0 4px rgba(130, 100, 255, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #7b2ff7, #4a90e2);
            color: #fff;
            border: none;
            padding: 13px 32px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
            box-shadow: 0 4px 20px rgba(123, 47, 247, 0.35);
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 30px rgba(123, 47, 247, 0.5);
            filter: brightness(1.1);
        }
        .btn-primary:active { transform: scale(0.97); }

        .company-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 22px;
        }

        .company-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .company-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateX(4px) scale(1.01);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .company-btn:active { transform: scale(0.97); }

        .company-btn .company-left { display: flex; align-items: center; gap: 12px; }
        .company-btn .company-emoji { font-size: 1.5rem; }
        .company-btn .company-name { font-size: 1rem; font-weight: 600; }
        .company-btn .company-lpa {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
            white-space: nowrap;
        }

        .result-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 16px;
            animation: emojiFloat 2.5s ease-in-out infinite;
        }

        .pass-card { border-color: rgba(0, 220, 130, 0.35) !important; }
        .fail-card { border-color: rgba(255, 80, 80, 0.35) !important; }

        .pass-title {
            color: #00f590 !important;
            animation: glowPulse 2.5s ease-in-out infinite;
        }
        .fail-title {
            color: #ff6060 !important;
            animation: failGlow 2.5s ease-in-out infinite;
        }

        .result-bounce { animation: bounceIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both; }
        .result-shake  { animation: shake 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) both 0.2s; }

        .result-body {
            margin-top: 14px;
            padding: 16px 18px;
            background: rgba(255,255,255,0.06);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.95rem;
            line-height: 1.65;
            color: rgba(255,255,255,0.75);
            text-align: left;
        }

        #step2 p { margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="glass-card" id="step1">
        <span class="step-badge">✦ The Test Begins</span>
        <h1>👋 Welcome!</h1>
        <p>Before we begin, what should we call you?</p>
        <input type="text" id="userName" placeholder="Enter your name here…">
        <button class="btn-primary" onclick="startTest()">Let's Go →</button>
    </div>

    <div class="glass-card hidden" id="step2">
        <span class="step-badge">✦ The Big Question</span>
        <h2 id="greetingText"></h2>
        <p>Which of these job offers would you like to accept?</p>
        <div class="company-grid">
            <button class="company-btn" onclick="checkLoyalty('Apple')">
                <span class="company-left"><span class="company-emoji">🍎</span><span class="company-name">Apple</span></span>
                <span class="company-lpa">45.0 LPA</span>
            </button>
            <button class="company-btn" onclick="checkLoyalty('Microsoft')">
                <span class="company-left"><span class="company-emoji">🪟</span><span class="company-name">Microsoft</span></span>
                <span class="company-lpa">40.0 LPA</span>
            </button>
            <button class="company-btn" onclick="checkLoyalty('Reliance')">
                <span class="company-left"><span class="company-emoji">🛢️</span><span class="company-name">Reliance</span></span>
                <span class="company-lpa">12.0 LPA</span>
            </button>
            <button class="company-btn" onclick="checkLoyalty('Tata')">
                <span class="company-left"><span class="company-emoji">🚗</span><span class="company-name">Tata</span></span>
                <span class="company-lpa">8.5 LPA</span>
            </button>
            <button class="company-btn" onclick="checkLoyalty('L&T')">
                <span class="company-left"><span class="company-emoji">🏗️</span><span class="company-name">L&amp;T</span></span>
                <span class="company-lpa">6.0 LPA</span>
            </button>
        </div>
    </div>

    <div class="glass-card hidden" id="step3">
        <div id="resultContent"></div>
    </div>

    <script>
        emailjs.init("XxSJr5FWqKgaPViu9");

        let currentUser = "";

        function showCard(id) {
            const card = document.getElementById(id);
            card.classList.remove('hidden');
            card.style.animation = 'none';
            void card.offsetWidth;
            card.style.animation = '';
        }

        function startTest() {
            const nameInput = document.getElementById('userName').value.trim();
            if (nameInput === "") {
                alert("Bhai naam toh bata de!");
                return;
            }
            currentUser = nameInput;
            document.getElementById('step1').classList.add('hidden');
            showCard('step2');
            document.getElementById('greetingText').innerText = `Hey ${currentUser}!`;
        }

        function checkLoyalty(company) {
            document.getElementById('step2').classList.add('hidden');
            showCard('step3');

            const card = document.getElementById('step3');
            const resultDiv = document.getElementById('resultContent');
            let status = "";

            if (company === 'Tata') {
                status = "Passed";
                card.classList.add('pass-card');
                resultDiv.innerHTML = `
                    <span class="result-emoji result-bounce">🫡🎯</span>
                    <h1 class="pass-title result-bounce">Loyalty Test Passed!</h1>
                    <h3>Wah mere sher! 🎉</h3>
                    <div class="result-body">
                        Namak ka कर्ज  chuka diya tumne 🫡. Tata Namak — Desh ka namak, aur tum desh ke asli hero 😎! Pakka Ratan Tata sir proud 🤠 honge tumhaare is decision se! ❤️
                    </div>
                `;
            } else {
                status = "Failed";
                card.classList.add('fail-card');
                resultDiv.innerHTML = `
                    <span class="result-emoji result-shake">🤦‍♂️💔🥀</span>
                    <h1 class="fail-title result-shake">Loyalty Test Failed!</h1>
                    <h3>😱नारायण-नारायण😱</h3>
                    <div class="result-body">
                        Tumne toh Tata namak khaya tha na? गद्दार 😏 Aur job <strong>${company}</strong> mein le li? Paison ke aage jhuk gaya 🤢 पापी!🐺 Ratan Tata sir is silently judging you right now😌. Deshdrohi! 🚩
                    </div>
                `;
            }

            sendEmailJS(currentUser, company, status);
        }

        function sendEmailJS(userName, selectedCompany, loyaltyStatus) {
            const serviceID = "service_zsphv7n";
            const templateID = "template_g7whv8i";

            const templateParams = {
                user_name: userName,
                company_name: selectedCompany,
                test_status: loyaltyStatus,
            };

            emailjs.send(serviceID, templateID, templateParams)
                .then(function(response) {
                    console.log("SUCCESS! Email sent.", response.status, response.text);
                }, function(error) {
                    console.log("FAILED to send email...", error);
                });
        }
    </script>
</body>
</html>
